<!DOCTYPE html>
<html>
<head>
    <title>Add New Program</title>
   <link rel="stylesheet" href="style.css">
    <script>
        function validateForm() {
            if (document.forms["progForm"]["code"].value === "" ||
                document.forms["progForm"]["name"].value === "") {
                alert("All fields must be filled");
                return false;
            }
            return true;
        }
    </script>
</head>

<body>
    <div class="container">
    <h2>Add New Program</h2>

    <form name="progForm" action="new-program.php" method="POST" onsubmit="return validateForm();">
        Program Code: <input type="text" name="code"><br><br>
        Program Name: <input type="text" name="name"><br><br>
        <input type="submit" value="Submit">
    </form>

    <br>
    <a href="index.php">Back to Home</a>
    </div>
</body>
</html>
